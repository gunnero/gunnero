name: profile-quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  profile-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check whitespace
        run: git diff --check HEAD^

      - name: Validate profile content boundaries
        shell: bash
        run: |
          set -euo pipefail
          files=(README.md SECURITY.md CHANGELOG.md .github/pull_request_template.md)
          if grep -Ein '(linkedin|visitor counter|contribution snake|trophy widget|github-readme-stats)' README.md; then
            echo 'Prohibited profile branding found.' >&2
            exit 1
          fi
          if grep -Ein '(/home/[^ ]+|ssh://|https?://[^ ]+\.(internal|local)|([0-9]{1,3}\.){3}[0-9]{1,3})' "${files[@]}"; then
            echo 'Private operational topology found.' >&2
            exit 1
          fi

      - name: Validate Markdown links
        shell: bash
        run: |
          set -euo pipefail
          ruby -e 'ARGV.each { |f| File.read(f).scan(/\[[^\]]+\]\((https:\/\/[^)]+)\)/).flatten.each { |u| puts u } }' README.md SECURITY.md CHANGELOG.md .github/pull_request_template.md \
            | sort -u > /tmp/profile-links.txt
          while IFS= read -r url; do
            curl --fail --silent --show-error --location --retry 2 --max-time 30 --output /dev/null "$url"
          done < /tmp/profile-links.txt

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
